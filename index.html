<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>毎日チェックリスト</title>
  <link rel="stylesheet" href="style.css?v=line1" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>今日のチェックリスト</h1>
      <div>
        <div id="today" class="today"></div>
        <div id="status" class="status">Firebase に接続中...</div>
      </div>
    </header>

    <section class="auth-area">
      <button id="loginBtn" class="login-btn" type="button">Googleでログイン</button>
      <div id="userInfo" class="user-info" hidden></div>
      <button id="logoutBtn" class="logout-btn" type="button" hidden>ログアウト</button>
    </section>

    <section id="lineArea" class="line-area" hidden>
      <input id="lineUserIdInput" type="text" aria-label="LINE通知先ユーザーID" placeholder="LINE通知先IDを入力" />
      <button id="saveLineBtn" type="button">LINE通知を保存</button>
    </section>

    <section class="input-area">
      <input id="taskInput" type="text" aria-label="タスク名入力" placeholder="タスク名を入力" />
      <button id="addBtn" aria-label="タスクを追加">追加</button>
    </section>

    <section id="listSection" class="list-section">
      <ul id="taskList" class="task-list" aria-live="polite"></ul>
      <div id="emptyMessage" class="empty">タスクを追加してください</div>
    </section>
  </main>

  <script type="module" src="app.js?v=line1"></script>
</body>
</html>
